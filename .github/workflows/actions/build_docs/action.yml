#
# A composite action to build the documentation.
#
name: Build Docs
description: Build the documentation

runs:
  using: composite

  steps:
    - name: Get current week number of year
      id: date
      run: echo "date=$(date +%Y-W%W)" >> $GITHUB_OUTPUT  # e.g., 2024-W19
      shell: bash

    # Install Micromamba with conda-forge dependencies
    - name: Setup Micromamba
      uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
      with:
        environment-name: pygmt
        cache-environment: true
        # environment cache is persistent for one week.
        cache-environment-key: micromamba-environment-${{ steps.date.outputs.date }}
        create-args: >-
          python=3.14
          gmt=6.6.0
          ghostscript=10.07.1
          numpy
          pandas
          xarray
          packaging
          contextily
          geopandas
          ipython
          pyarrow-core
          rioxarray
          make
          pip
          python-build
          myst-nb
          panel
          sphinx>=6.2
          sphinx-autodoc-typehints
          sphinx-copybutton
          sphinx-design
          sphinx-gallery
          sphinx_rtd_theme
          cairosvg
          sphinxcontrib-svg2pdfconverter
          tectonic=0.15

    # Download cached remote files (artifacts) from GitHub
    - name: Download remote data from GitHub
      run: |
        # Download cached files to ~/.gmt directory and list them
        gh run download --name gmt-cache --dir ~/.gmt/
        # Change modification times of the two files, so GMT won't refresh it
        touch ~/.gmt/gmt_data_server.txt ~/.gmt/gmt_hash_server.txt
        ls -lhR ~/.gmt
      shell: bash -l {0}
      env:
        GH_TOKEN: ${{ github.token }}

    # Install the package that we want to test
    - name: Install the package
      run: |
        python -m build --sdist
        python -m pip install dist/*
      shell: bash -l {0}

    - name: Build the HTML documentation
      env:
        GMT_DATA_SERVER: https://opentopography.s3.sdsc.edu/gmtdata
      run: |
        log_file="${RUNNER_TEMP}/sphinx-html.log"
        make -C doc clean html 2>&1 | tee "${log_file}"
        exit_code=${PIPESTATUS[0]}
        if [[ "${RUNNER_OS}" == "Windows" && "${exit_code}" -eq 2 ]] && grep -q "make: .* Error 2816" "${log_file}"; then
          echo "Sphinx HTML build exited with make error 2816 (segmentation fault) on Windows; allowing workflow to continue."
          exit 0
        fi
        exit "${exit_code}"
      shell: bash -l {0}

    - name: Build the PDF documentation
      env:
        GMT_DATA_SERVER: https://opentopography.s3.sdsc.edu/gmtdata
      run: |
        log_file="${RUNNER_TEMP}/sphinx-pdf.log"
        make -C doc pdf 2>&1 | tee "${log_file}"
        exit_code=${PIPESTATUS[0]}
        if [[ "${RUNNER_OS}" == "Windows" && "${exit_code}" -eq 2 ]] && grep -q "make: .* Error 2816" "${log_file}"; then
          echo "Sphinx PDF build exited with make error 2816 (segmentation fault) on Windows; allowing workflow to continue."
          exit 0
        fi
        exit "${exit_code}"
      shell: bash -l {0}
